<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoşgeldiniz | Betül Gümüş</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .success-icon {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto 2rem;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50% { box-shadow: 0 0 0 16px rgba(16,185,129,0); }
    }
    .welcome-card {
      background: var(--bg-card);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: var(--radius-lg);
      padding: 50px 44px;
      max-width: 500px; margin: auto;
      text-align: center;
    }
    .info-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 50px;
      color: #34d399; padding: 6px 18px;
      font-size: 0.85rem; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <div class="brand-logo">BG</div>
      <span class="brand-text">Betül Gümüş</span>
    </a>
    <div class="ms-auto">
      <button onclick="cikisYap()" class="btn-outline-gold" style="padding:6px 16px; font-size:0.88rem; border:none; cursor:pointer;">
        <i class="bi bi-box-arrow-right"></i> Çıkış Yap
      </button>
    </div>
  </div>
</nav>

<main style="min-height:100vh; display:flex; align-items:center; background:linear-gradient(135deg, var(--bg-primary) 0%, #0a1628 100%);">
  <div class="container py-5">
    <div class="welcome-card">

      <div class="success-icon">✓</div>

      <div class="info-pill mb-4">
        <i class="bi bi-shield-check-fill"></i> Giriş Başarılı
      </div>

      <h1 style="font-family:'Playfair Display',serif; font-size:2rem; font-weight:800; margin-bottom:0.5rem;">
        Hoşgeldiniz 👋
      </h1>

      <h2 id="ogrenci-no" style="color:var(--accent); font-size:1.3rem; font-weight:700; margin-bottom:1.5rem;">
        b231210091
      </h2>

      <p style="color:var(--text-secondary); margin-bottom:2rem; line-height:1.8;">
        Sakarya Üniversitesi öğrenci portalına başarıyla giriş yaptınız.<br />
        Giriş tarihi: <strong id="giris-tarihi" style="color:var(--text-primary);"></strong>
      </p>

      <div class="card-dark mb-4" style="text-align:left;">
        <div style="font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:12px;">Oturum Bilgileri</div>
        <div style="display:flex; gap:10px; margin-bottom:8px;">
          <i class="bi bi-person-fill" style="color:var(--accent);"></i>
          <span id="info-no" style="font-size:0.9rem; color:var(--text-secondary);">b231210091</span>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:8px;">
          <i class="bi bi-envelope-fill" style="color:var(--accent);"></i>
          <span id="info-email" style="font-size:0.9rem; color:var(--text-secondary);">b231210091@sakarya.edu.tr</span>
        </div>
        <div style="display:flex; gap:10px;">
          <i class="bi bi-clock-fill" style="color:var(--accent);"></i>
          <span id="info-tarih" style="font-size:0.9rem; color:var(--text-secondary);"></span>
        </div>
      </div>

      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="index.html" class="btn-gold text-decoration-none">
          <i class="bi bi-house-fill"></i> Ana Sayfa
        </a>
        <button onclick="cikisYap()" class="btn-outline-gold" style="border:none; cursor:pointer; text-decoration:none;">
          <i class="bi bi-box-arrow-right"></i> Çıkış Yap
        </button>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Oturum kontrolü - eğer giriş yapılmamışsa login'e gönder
  const oturumBilgisi = sessionStorage.getItem('giris_yapildi');
  if (!oturumBilgisi) {
    window.location.href = 'login.html';
  }

  // Bilgileri doldur
  const bilgiler = JSON.parse(oturumBilgisi || '{}');
  const ogrenciNo = bilgiler.ogrenci_no || 'b231210091';
  const girisTarihi = bilgiler.giris_tarihi || new Date().toLocaleString('tr-TR');

  document.getElementById('ogrenci-no').textContent = ogrenciNo;
  document.getElementById('giris-tarihi').textContent = girisTarihi;
  document.getElementById('info-no').textContent = ogrenciNo;
  document.getElementById('info-email').textContent = ogrenciNo + '@sakarya.edu.tr';
  document.getElementById('info-tarih').textContent = girisTarihi;

  function cikisYap() {
    sessionStorage.removeItem('giris_yapildi');
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
