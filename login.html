<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Güvenli giriş paneli — öğrenci numarası ile kimlik doğrulama." />
  <title>Giriş Yap | Betül Gümüş</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-page">
  <div class="container" style="position:relative; z-index:2;">
    <div class="row justify-content-center">
      <div class="col-12">

        <div class="login-card">

          <!-- Logo -->
          <div class="login-logo">BG</div>

          <!-- Başlık -->
          <h1 class="login-title">Giriş Yap</h1>
          <p class="login-sub">Öğrenci numaranız ve şifrenizle giriş yapın</p>

          <!-- Hata Mesajı (URL'den ?hata= parametresiyle) -->
          <div id="hataMesaji" class="error-banner" style="display:none;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="hataMesajiMetin"></span>
          </div>

          <!-- Native JS Hata Mesajı -->
          <div id="jsHata" class="error-banner" style="display:none;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="jsHataMetin"></span>
          </div>

          <!-- Login Formu -->
          <form id="loginForm" action="login_kontrol.php" method="POST" novalidate>

            <!-- E-posta -->
            <div class="form-group">
              <label class="form-label" for="loginEmail">
                <i class="bi bi-envelope me-1"></i>E-posta (Öğrenci No@sakarya.edu.tr)
              </label>
              <input
                type="email"
                id="loginEmail"
                name="email"
                class="form-control-dark"
                placeholder="b231210091@sakarya.edu.tr"
                autocomplete="username"
              />
              <div class="error-msg" id="err-login-email">Geçerli bir e-posta adresi giriniz (örn: bXXX@sakarya.edu.tr).</div>
            </div>

            <!-- Şifre -->
            <div class="form-group" style="position:relative;">
              <label class="form-label" for="loginSifre">
                <i class="bi bi-lock me-1"></i>Şifre (Öğrenci Numarası)
              </label>
              <div style="position:relative;">
                <input
                  type="password"
                  id="loginSifre"
                  name="sifre"
                  class="form-control-dark"
                  placeholder="b231210091"
                  autocomplete="current-password"
                  style="padding-right: 48px;"
                />
                <button
                  type="button"
                  id="toggleSifre"
                  onclick="sifreGoster()"
                  style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                         background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem;"
                  aria-label="Şifreyi göster/gizle"
                >
                  <i class="bi bi-eye" id="sifreGoz"></i>
                </button>
              </div>
              <div class="error-msg" id="err-login-sifre">Şifre alanı boş bırakılamaz.</div>
            </div>

            <!-- Giriş Butonu -->
            <button
              type="button"
              id="btnLogin"
              class="btn-gold w-100 justify-content-center mt-2"
              style="font-size:1rem; padding:14px;"
              onclick="loginDogrula()"
            >
              <i class="bi bi-box-arrow-in-right"></i>
              Giriş Yap
            </button>

          </form>

          <!-- Bilgilendirme -->
          <div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); text-align:center;">
            <p style="color:var(--text-muted); font-size:0.8rem; margin-bottom:0.5rem;">
              <i class="bi bi-info-circle me-1"></i>Test Giriş Bilgileri:
            </p>
            <p style="color:var(--text-secondary); font-size:0.82rem; margin:0;">
              <strong>E-posta:</strong> b231210091@sakarya.edu.tr<br>
              <strong>Şifre:</strong> b231210091
            </p>
          </div>

          <!-- Ana Sayfaya Dön -->
          <div style="text-align:center; margin-top:1.5rem;">
            <a href="index.html" style="color:var(--text-muted); font-size:0.85rem; text-decoration:none;">
              <i class="bi bi-arrow-left me-1"></i>Ana Sayfaya Dön
            </a>
          </div>

        </div><!-- /login-card -->

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* =====================================================
   URL'den gelen hata parametresini kontrol et
   ===================================================== */
(function () {
  const params = new URLSearchParams(window.location.search);
  const hata = params.get('hata');
  const hataMesaji = document.getElementById('hataMesaji');
  const hataMesajiMetin = document.getElementById('hataMesajiMetin');

  if (hata === 'bos') {
    hataMesaji.style.display = 'flex';
    hataMesajiMetin.textContent = 'E-posta ve şifre alanları boş bırakılamaz!';
  } else if (hata === 'yanlis') {
    hataMesaji.style.display = 'flex';
    hataMesajiMetin.textContent = 'E-posta veya şifre hatalı. Lütfen tekrar deneyin.';
  }
})();

/* =====================================================
   Native JavaScript Doğrulama
   ===================================================== */
function loginDogrula() {
  let gecerli = true;

  // Hataları sıfırla
  document.getElementById('err-login-email').classList.remove('show');
  document.getElementById('err-login-sifre').classList.remove('show');
  document.getElementById('loginEmail').classList.remove('field-error', 'field-success');
  document.getElementById('loginSifre').classList.remove('field-error', 'field-success');
  document.getElementById('jsHata').style.display = 'none';
  document.getElementById('hataMesaji').style.display = 'none';

  const email = document.getElementById('loginEmail').value.trim();
  const sifre = document.getElementById('loginSifre').value.trim();

  // E-posta format kontrolü — Sakarya formatı
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!email || !emailRegex.test(email)) {
    document.getElementById('err-login-email').classList.add('show');
    document.getElementById('loginEmail').classList.add('field-error');
    gecerli = false;
  } else {
    document.getElementById('loginEmail').classList.add('field-success');
  }

  // Şifre boş mu?
  if (!sifre) {
    document.getElementById('err-login-sifre').classList.add('show');
    document.getElementById('loginSifre').classList.add('field-error');
    gecerli = false;
  } else {
    document.getElementById('loginSifre').classList.add('field-success');
  }

  if (!gecerli) {
    const jsHata = document.getElementById('jsHata');
    jsHata.style.display = 'flex';
    document.getElementById('jsHataMetin').textContent = 'Lütfen alanları doğru şekilde doldurun!';
    return;
  }

  // Doğrulama geçti — formu PHP'ye gönder
  document.getElementById('loginForm').submit();
}

/* =====================================================
   Şifre Göster / Gizle
   ===================================================== */
function sifreGoster() {
  const input = document.getElementById('loginSifre');
  const goz = document.getElementById('sifreGoz');
  if (input.type === 'password') {
    input.type = 'text';
    goz.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    goz.className = 'bi bi-eye';
  }
}

/* =====================================================
   Enter tuşu ile form gönder
   ===================================================== */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { loginDogrula(); }
});
</script>

</body>
</html>
